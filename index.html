<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nicheso - Niche Applications</title>
  <meta name="description" content="Nicheso builds niche applications that solve everyday decisions. Our first product, Not That, helps you decide where to eat.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>N</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d0d1a;
      color: #f0f0f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
      text-align: center;
    }

    .logo {
      font-size: 48px;
      font-weight: 900;
      letter-spacing: -2px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #4ecdc4, #44a8a0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 18px;
      color: rgba(240, 240, 245, 0.5);
      font-weight: 400;
      margin-bottom: 60px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .product {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 440px;
      width: 100%;
    }

    .product-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(78, 205, 196, 0.6);
      margin-bottom: 16px;
    }

    .product-name {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    .product-desc {
      font-size: 16px;
      line-height: 1.6;
      color: rgba(240, 240, 245, 0.6);
      margin-bottom: 24px;
    }

    .product-link {
      display: inline-block;
      color: #4ecdc4;
      font-weight: 600;
      font-size: 14px;
      text-decoration: none;
      border-bottom: 1px solid rgba(78, 205, 196, 0.3);
      padding-bottom: 2px;
      transition: border-color 0.2s;
    }

    .product-link:hover {
      border-color: #4ecdc4;
    }

    footer {
      padding: 32px 24px;
      text-align: center;
      color: rgba(240, 240, 245, 0.25);
      font-size: 13px;
    }

    footer a {
      color: rgba(240, 240, 245, 0.4);
      text-decoration: none;
    }

    footer a:hover {
      color: rgba(240, 240, 245, 0.6);
    }
  </style>
</head>
<body>
  <main class="hero">
    <h1 class="logo">nicheso</h1>
    <p class="subtitle">Niche Applications</p>

    <div class="product">
      <p class="product-label">Our Product</p>
      <h2 class="product-name">Not That</h2>
      <p class="product-desc">
        Can't decide where to eat? Not That eliminates restaurants one by one until you have your answer. Play solo or decide together with friends in real time.
      </p>
      <a href="https://nothat.app" class="product-link">nothat.app</a>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 Nicheso &middot; <a href="mailto:contact@nicheso.com">contact@nicheso.com</a></p>
  </footer>
</body>
</html>
