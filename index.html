<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Niche Solutions</title>
  <meta name="description" content="Niche Solutions — technology consulting and custom software development.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>N</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d0d1a;
      color: #f0f0f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
      text-align: center;
    }
    .logo {
      font-size: 48px;
      font-weight: 900;
      letter-spacing: -2px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #6c63ff, #5a52d5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      font-size: 18px;
      color: rgba(240, 240, 245, 0.5);
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    footer {
      padding: 32px 24px;
      text-align: center;
      color: rgba(240, 240, 245, 0.25);
      font-size: 13px;
    }
    footer a {
      color: rgba(240, 240, 245, 0.4);
      text-decoration: none;
    }
    footer a:hover {
      color: rgba(240, 240, 245, 0.6);
    }
  </style>
</head>
<body>
  <main class="hero">
    <h1 class="logo">Niche Solutions</h1>
    <p class="subtitle">Coming soon</p>
  </main>
  <footer>
    <p>&copy; 2026 Niche Solutions &middot; <a href="mailto:hello@nicheso.com">hello@nicheso.com</a></p>
  </footer>
</body>
</html>
